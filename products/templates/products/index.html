{% extends 'products/base.html' %}
{% load static %}

{% block title %}Products - Marketplace{% endblock %}

{% block content %}
<section class="py-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="text-4xl font-bold text-gray-900 mb-10 text-center">Products</h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      {% for product in products %}
      <article class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition">
        <img src="{% static product.image %}" alt="{{ product.name }}" class="w-full h-48 object-cover">
        <div class="p-6">
          <h2 class="text-xl font-semibold text-gray-900">{{ product.name }}</h2>
          <p class="text-blue-700 font-bold text-lg mt-2">${{ product.price }}</p>

          <a href="{% url 'product_detail' product.id %}" class="inline-block mt-5 px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition">
            Show
          </a>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
