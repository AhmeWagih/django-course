<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}About Us{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <!-- Navigation (optional) -->
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="text-2xl font-bold text-blue-600">Marketplace</a>
        </div>
        <div class="flex items-center space-x-6">
          <a href="/" class="text-gray-700 hover:text-blue-600 transition">Home</a>
          <a href="/about/" class="text-gray-700 hover:text-blue-600 transition">About</a>
          <a href="/contact/" class="text-gray-700 hover:text-blue-600 transition">Contact</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="min-h-screen">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer (optional) -->
  <footer class="bg-gray-900 text-white py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <h3 class="text-lg font-semibold mb-4">About</h3>
          <p class="text-gray-400">Your trusted marketplace for quality products.</p>
        </div>
        <div>
          <h3 class="text-lg font-semibold mb-4">Links</h3>
          <ul class="space-y-2 text-gray-400">
            <li><a href="/" class="hover:text-white transition">Home</a></li>
            <li><a href="/about/" class="hover:text-white transition">About Us</a></li>
            <li><a href="/contact/" class="hover:text-white transition">Contact Us</a></li>
          </ul>
        </div>
        <div>
          <h3 class="text-lg font-semibold mb-4">Contact</h3>
          <p class="text-gray-400">Email: info@marketplace.com</p>
          <p class="text-gray-400">Phone: +1 (555) 123-4567</p>
        </div>
      </div>
      <div class="border-t border-gray-800 mt-8 pt-8 text-center text-gray-400">
        <p>&copy; 2026 Marketplace. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
